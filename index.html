<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Arrow Game - Full</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script type="text/javascript">
        var sc_project=13288355; 
        var sc_invisible=1; 
        var sc_security="bd1c8e65"; 
    </script>
    <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>

    <style>
        body { margin: 0; overflow: hidden; background: #33FF57; font-family: 'Arial', sans-serif; touch-action: none; transition: background 0.5s; }
        #player { position: absolute; left: 100px; font-size: 50px; transform: rotate(90deg); transition: transform 0.1s; }
        .obstacle { position: absolute; background: red; height: 10px; border-radius: 5px; }
        #score { position: absolute; top: 20px; left: 20px; font-size: 30px; color: white; pointer-events: none; z-index: 10; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 40px; color: white; font-weight: bold; text-shadow: 2px 2px 4px #000; padding: 20px; z-index: 5; }
        
        #ap-btn { 
            position: absolute; top: 10px; right: 10px; 
            background: red; color: white; 
            padding: 15px 20px; cursor: pointer; 
            border-radius: 10px; z-index: 99999; 
            font-size: 24px; font-weight: bold;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; justify-content: center; align-items: center; color: white; }
        .panel { background: #333; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 300px; }
        input { padding: 15px; font-size: 18px; width: 80%; margin-bottom: 10px; border-radius: 5px; border: none; pointer-events: auto; }
        button { padding: 15px; font-size: 18px; width: 100%; cursor: pointer; background: #33FF57; border: none; margin-top: 10px; border-radius: 5px; font-weight: bold;}
    </style>
</head>
<body>
    <div id="ap-btn">AP</div>
    <div id="score">Score: 0</div>
    <div id="msg">לחץ על המסך כדי להתחיל!</div>
    <div id="player">➤</div>

    <div id="password-modal" class="modal">
        <div class="panel">
            <h2>ניהול</h2>
            <input type="password" id="passInput" placeholder="סיסמה">
            <button onclick="checkPassword()">כניסה</button>
            <button onclick="closeModals()" style="background:#555;">ביטול</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="panel">
            <h2>פאנל ניהול</h2>
            Score: <input type="number" id="scoreInput"><br>
            Speed: <input type="number" id="speedInput"><br>
            Gravity: <input type="number" id="gravityInput" step="0.1"><br>
            <label><input type="checkbox" id="godModeToggle"> God Mode</label><br>
            <button onclick="applySettings()">החל שינויים</button>
            <button onclick="closeModals()">סגור</button>
        </div>
    </div>

    <script>
        let isPaused = false, isGodMode = false, y = 300, velocity = 0, gameStarted = false, isGameOver = false, score = 0, obstacles = [], gameSpeed = 5, gravity = 0.3;
        const player = document.getElementById('player'), scoreDisplay = document.getElementById('score'), msg = document.getElementById('msg');

        function openPasswordModal() { 
            isPaused = true; 
            document.getElementById('password-modal').style.display = 'flex'; 
            setTimeout(() => { document.getElementById('passInput').focus(); }, 300);
        }

        document.getElementById('ap-btn').addEventListener('touchstart', (e) => { e.stopPropagation(); openPasswordModal(); }, { passive: false });
        document.getElementById('ap-btn').addEventListener('mousedown', (e) => { e.stopPropagation(); openPasswordModal(); });

        function closeModals() { isPaused = false; document.getElementById('password-modal').style.display = 'none'; document.getElementById('admin-panel').style.display = 'none'; }

        function checkPassword() {
            if(document.getElementById('passInput').value === "4545") {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
                document.getElementById('scoreInput').value = score;
                document.getElementById('speedInput').value = gameSpeed;
                document.getElementById('gravityInput').value = gravity;
            } else { alert("סיסמה שגויה!"); }
        }

        function applySettings() {
            score = parseInt(document.getElementById('scoreInput').value);
            gameSpeed = parseInt(document.getElementById('speedInput').value);
            gravity = parseFloat(document.getElementById('gravityInput').value);
            isGodMode = document.getElementById('godModeToggle').checked;
            scoreDisplay.innerText = "Score: " + score;
        }

        function handleInput() { 
            if (isPaused) return; 
            if (isGameOver) location.reload(); 
            if (!gameStarted) { gameStarted = true; msg.style.display = 'none'; gameLoop(); }
            velocity = -6; 
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, { passive: false });

        function gameLoop() {
            if (!gameStarted || isGameOver || isPaused) { requestAnimationFrame(gameLoop); return; }
            velocity += gravity; y += velocity; player.style.top = y + 'px';
            obstacles.forEach((obs, index) => {
                let obsLeft = parseInt(obs.style.left);
                obs.style.left = (obsLeft - gameSpeed) + 'px';
                if (!isGodMode && player.getBoundingClientRect().left < obs.getBoundingClientRect().right && player.getBoundingClientRect().right > obs.getBoundingClientRect().left && player.getBoundingClientRect().top < obs.getBoundingClientRect().bottom && player.getBoundingClientRect().bottom > obs.getBoundingClientRect().top) isGameOver = true;
                if (obsLeft < -100) { obs.remove(); obstacles.splice(index, 1); score++; scoreDisplay.innerText = "Score: " + score; }
            });
            if (y > window.innerHeight || y < 0) isGameOver = true;
            requestAnimationFrame(gameLoop);
        }
        setInterval(() => { if (!isPaused && gameStarted && !isGameOver) { const obs = document.createElement('div'); obs.className = 'obstacle'; obs.style.width = '100px'; obs.style.top = (Math.random() * (window.innerHeight - 50)) + 'px'; obs.style.left = window.innerWidth + 'px'; document.body.appendChild(obs); obstacles.push(obs); }}, 1500);
    </script>
</body>
</html>
