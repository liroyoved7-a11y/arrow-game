<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Game - Professional Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #33FF57; font-family: sans-serif; transition: background 0.5s; }
        
        /* Brainrot Announcement Bar */
        #announcement-bar {
            position: fixed; top: 0; width: 100%; height: 50px; background: red;
            color: yellow; display: none; align-items: center; justify-content: center;
            font-size: 25px; font-weight: bold; z-index: 9999; 
            border-bottom: 5px solid yellow;
            animation: flash 0.5s infinite;
        }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; transition: none; }
        #player { position: absolute; left: 100px; font-size: 50px; transform: rotate(90deg); z-index: 2; top: 300px; transition: all 0.3s; }
        .obstacle { position: absolute; background: red; height: 10px; width: 100px; border-radius: 5px; z-index: 1; }
        #score, #best-score, #location { position: absolute; left: 20px; color: white; font-size: 20px; pointer-events: none; z-index: 10; font-weight: bold; }
        #score { top: 60px; }
        #best-score { top: 90px; color: yellow; }
        #location { top: 120px; font-size: 15px; font-style: italic; }
        #ap-btn { position: absolute; top: 60px; right: 10px; background: red; color: white; padding: 10px; cursor: pointer; z-index: 999; border-radius: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; color: white; flex-direction: column; }
        .panel { background: #333; padding: 20px; border-radius: 15px; text-align: center; z-index: 10001; }
        input, select { padding: 10px; margin: 5px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; border-radius: 5px; border: none; background: #fff; }
    </style>
</head>
<body>
    <div id="announcement-bar"></div>

    <div id="ap-btn" onclick="openPasswordModal()">AP</div>
    
    <div id="score">Score: 0</div>
    <div id="best-score">Best: 0</div>
    <div id="location">Loading location...</div>
    
    <div id="game-container">
        <div id="player">➤</div>
    </div>

    <div id="password-modal" class="modal">
        <div class="panel">
            <h2>כניסת מנהל</h2>
            <input type="password" id="passInput" placeholder="סיסמה">
            <button onclick="checkPassword()">אישור</button>
            <button onclick="closeModals()">ביטול</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="panel">
            <h2>Admin Panel</h2>
            <p style="font-size: 12px; color: #aaa;">הגדרות מקומיות (לא משפיעות על אחרים)</p>
            Score: <input type="number" id="scoreInput"><br>
            Speed: <input type="number" id="speedInput"><br>
            <label><input type="checkbox" id="godModeToggle"> God Mode</label><br>
            <hr>
            <p style="font-size: 12px; color: #aaa;">הגדרות גלובליות (משפיעות על כולם)</p>
            Skin: <select id="skinInput">
                <option value="➤">חץ רגיל (➤)</option>
                <option value="🚀">טיל (🚀)</option>
                <option value="🔥">אש (🔥)</option>
                <option value="😎">סמיילי (😎)</option>
            </select><br>
            BG Color: <input type="color" id="colorInput" value="#33FF57"><br>
            <input type="text" id="msgInput" placeholder="הודעה לכולם">
            <button onclick="sendAnnouncement()">שלח הודעה</button>
            <button onclick="applySettings()">החל הגדרות</button>
            <hr>
            <button onclick="kickAllPlayers()" style="background: red; color: white; width: 100%; margin-top: 10px;">Kick All Players</button>
        </div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="panel">
            <h1>GAME OVER!</h1>
            <input type="text" id="playerName" placeholder="הכנס שם ללוח">
            <button onclick="submitScore()">שמור ניקוד</button>
            <div id="leaderboard">
                <h3>Top 3:</h3>
                <div id="list">טוען...</div>
            </div>
            <button onclick="location.reload()">שחק שוב</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBb-YNjJeCIk23EdUxVLrfeWkpuuicc3sY",
            authDomain: "arrowgameleaderboard.firebaseapp.com",
            projectId: "arrowgameleaderboard",
            storageBucket: "arrowgameleaderboard.firebasestorage.app",
            messagingSenderId: "486658082903",
            appId: "1:486658082903:web:d6f86af4c5aba6a78ffb12"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // אתחול בסיס נתונים אם חסר
        async function initializeSystem() {
            const docRef = db.collection("system").doc("settings");
            const doc = await docRef.get();
            if (!doc.exists) {
                await docRef.set({ playerIcon: "➤", command: "", message: "", backgroundColor: "#33FF57" });
            }
        }
        initializeSystem();

        // מאזין לשרת
        db.collection("system").doc("settings").onSnapshot((doc) => {
            if (!doc.exists) return;
            const data = doc.data();
            
            // פקודת רענון
            if (data.command === "reload") {
                db.collection("system").doc("settings").update({ command: "" });
                location.reload();
            }
            
            // עדכון סקין
            if (data.playerIcon) document.getElementById('player').innerText = data.playerIcon;
            
            // עדכון רקע
            if (data.backgroundColor) document.body.style.backgroundColor = data.backgroundColor;
            
            // הודעה גלובלית
            const bar = document.getElementById('announcement-bar');
            if (data.message && data.message.trim() !== "") {
                bar.innerText = data.message;
                bar.style.display = 'flex';
            } else {
                bar.style.display = 'none';
            }
        });

        // משתני משחק
        let score = 0, y = 300, velocity = 0, gameStarted = false, isGameOver = false, gameSpeed = 5, isGodMode = false, isPaused = false;
        let obstacles = [];
        let bestScore = localStorage.getItem('bestScore') || 0;
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const gameContainer = document.getElementById('game-container');

        // מיקום גיאוגרפי
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
            document.getElementById('location').innerText = d.city + ", " + d.country_name;
        }).catch(() => {});

        // פונקציות ממשק
        function openPasswordModal() { isPaused = true; gameContainer.style.pointerEvents = 'none'; document.getElementById('password-modal').style.display = 'flex'; }
        function closeModals() { isPaused = false; gameContainer.style.pointerEvents = 'auto'; document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function checkPassword() {
            if(document.getElementById('passInput').value === "1245") {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
            } else { alert("סיסמה שגויה"); }
        }

        async function sendAnnouncement() {
            const msg = document.getElementById('msgInput').value;
            await db.collection("system").doc("settings").update({ message: msg });
            alert("הודעה נשלחה לכולם!");
        }

        async function applySettings() {
            // הגדרות מקומיות
            score = parseInt(document.getElementById('scoreInput').value);
            gameSpeed = parseInt(document.getElementById('speedInput').value);
            isGodMode = document.getElementById('godModeToggle').checked;
            scoreDisplay.innerText = "Score: " + score;
            
            // הגדרות גלובליות
            const skin = document.getElementById('skinInput').value;
            const bgColor = document.getElementById('colorInput').value;
            
            await db.collection("system").doc("settings").update({ 
                playerIcon: skin,
                backgroundColor: bgColor
            });
            closeModals();
        }

        async function kickAllPlayers() {
            if (confirm("אתה בטוח? זה ירענן את המשחק לכולם!")) {
                await db.collection("system").doc("settings").update({ command: "reload" });
            }
        }

        async function submitScore() {
            const name = document.getElementById('playerName').value || "Anonymous";
            await db.collection("scores").add({ name, score: parseInt(score), timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            updateLeaderboard();
        }

        async function updateLeaderboard() {
            const snapshot = await db.collection("scores").orderBy("score", "desc").limit(3).get();
            let html = "";
            snapshot.forEach((doc, i) => { html += `<p>${i+1}. ${doc.data().name}: ${doc.data().score}</p>`; });
            document.getElementById('list').innerHTML = html;
        }

        function gameOver() {
            isGameOver = true;
            if (score > bestScore) { bestScore = score; localStorage.setItem('bestScore', bestScore); }
            document.getElementById('game-over-modal').style.display = 'flex';
            updateLeaderboard();
        }

        function handleJump(e) { if(isGameOver || isPaused) return; gameStarted = true; velocity = -6; }
        gameContainer.addEventListener('touchstart', handleJump, {passive: false});
        window.addEventListener('mousedown', handleJump);

        function gameLoop() {
            if (isPaused) { requestAnimationFrame(gameLoop); return; }
            if (!gameStarted || isGameOver) { requestAnimationFrame(gameLoop); return; }
            velocity += 0.3; y += velocity; player.style.top = y + 'px';
            if (y > window.innerHeight || y < 0) gameOver();
            obstacles.forEach((obs, index) => {
                let obsLeft = parseInt(obs.style.left);
                obs.style.left = (obsLeft - gameSpeed) + 'px';
                let p = player.getBoundingClientRect();
                let o = obs.getBoundingClientRect();
                if (!isGodMode && p.left < o.right && p.right > o.left && p.top < o.bottom && p.bottom > o.top) gameOver();
                if (obsLeft < -100) { obs.remove(); obstacles.splice(index, 1); score++; scoreDisplay.innerText = "Score: " + score; }
            });
            requestAnimationFrame(gameLoop);
        }

        setInterval(() => {
            if (gameStarted && !isGameOver && !isPaused) {
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                obs.style.top = (Math.random() * (window.innerHeight - 50)) + 'px';
                obs.style.left = window.innerWidth + 'px';
                document.body.appendChild(obs);
                obstacles.push(obs);
            }
        }, 1500);

        gameLoop();
    </script>
</body>
</html>
