<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Arrow Game - Final Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #33FF57; font-family: sans-serif; }
        
        /* אזור המשחק - כאן המגע יגרום לקפיצה */
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
        
        #player { position: absolute; left: 100px; font-size: 50px; transform: rotate(90deg); z-index: 2; top: 300px; }
        .obstacle { position: absolute; background: red; height: 10px; width: 100px; border-radius: 5px; z-index: 1; }
        #score, #best-score, #location { position: absolute; left: 20px; color: white; font-size: 20px; pointer-events: none; z-index: 10; font-weight: bold; }
        #score { top: 20px; }
        #best-score { top: 50px; color: yellow; }
        #location { top: 80px; font-size: 15px; font-style: italic; }
        
        #ap-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; padding: 10px; cursor: pointer; z-index: 999; border-radius: 5px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; color: white; flex-direction: column; }
        .panel { background: #333; padding: 20px; border-radius: 15px; text-align: center; z-index: 10001; }
        input { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; border-radius: 5px; border: none; background: #fff; }
    </style>
</head>
<body>
    <div id="ap-btn" onclick="openPasswordModal()">AP</div>
    <div id="score">Score: 0</div>
    <div id="best-score">Best: 0</div>
    <div id="location">Loading location...</div>
    
    <div id="game-container">
        <div id="player">➤</div>
    </div>

    <div id="password-modal" class="modal">
        <div class="panel">
            <input type="password" id="passInput" placeholder="סיסמה">
            <button onclick="checkPassword()">אישור</button>
            <button onclick="closeModals()">ביטול</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="panel">
            Score: <input type="number" id="scoreInput"><br>
            Speed: <input type="number" id="speedInput"><br>
            <label><input type="checkbox" id="godModeToggle"> God Mode</label><br>
            <button onclick="applySettings()">החל שינויים</button>
        </div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="panel">
            <h1>GAME OVER!</h1>
            <input type="text" id="playerName" placeholder="הכנס שם ללוח">
            <button onclick="submitScore()">שמור ניקוד</button>
            <div id="leaderboard">
                <h3>Top 3:</h3>
                <div id="list">טוען...</div>
            </div>
            <button onclick="location.reload()">שחק שוב</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG (הכנס כאן את שלך) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBb-YNjJeCIk23EdUxVLrfeWkpuuicc3sY",
            authDomain: "arrowgameleaderboard.firebaseapp.com",
            projectId: "arrowgameleaderboard",
            storageBucket: "arrowgameleaderboard.firebasestorage.app",
            messagingSenderId: "486658082903",
            appId: "1:486658082903:web:d6f86af4c5aba6a78ffb12"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. משתני משחק ---
        let score = 0, y = 300, velocity = 0, gameStarted = false, isGameOver = false, gameSpeed = 5, isGodMode = false;
        let obstacles = [];
        let bestScore = localStorage.getItem('bestScore') || 0;
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best-score');
        const gameContainer = document.getElementById('game-container');

        bestDisplay.innerText = "Best: " + bestScore;
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => document.getElementById('location').innerText = d.city + ", " + d.country_name).catch(() => {});

        // --- 3. לוגיקה ניהול ---
        function openPasswordModal() { document.getElementById('password-modal').style.display = 'flex'; }
        function checkPassword() {
            if(document.getElementById('passInput').value === "1245") {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
                document.getElementById('scoreInput').value = score;
                document.getElementById('speedInput').value = gameSpeed;
            } else { alert("סיסמה שגויה"); }
        }
        function applySettings() {
            score = parseInt(document.getElementById('scoreInput').value);
            gameSpeed = parseInt(document.getElementById('speedInput').value);
            isGodMode = document.getElementById('godModeToggle').checked;
            scoreDisplay.innerText = "Score: " + score;
            closeModals();
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        // --- 4. לוגיקה Firebase ---
        async function submitScore() {
            const name = document.getElementById('playerName').value || "Anonymous";
            await db.collection("scores").add({ name, score, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            alert("נשמר!");
            updateLeaderboard();
        }
        async function updateLeaderboard() {
            const listDiv = document.getElementById('list');
            const snapshot = await db.collection("scores").orderBy("score", "desc").limit(3).get();
            let html = "";
            snapshot.forEach((doc, i) => { html += `<p>${i+1}. ${doc.data().name}: ${doc.data().score}</p>`; });
            listDiv.innerHTML = html;
        }

        // --- 5. מנוע המשחק ---
        function gameOver() {
            isGameOver = true;
            if (score > bestScore) { bestScore = score; localStorage.setItem('bestScore', bestScore); }
            document.getElementById('game-over-modal').style.display = 'flex';
            updateLeaderboard();
        }

        // פונקציית קפיצה (רק למשחק)
        function handleJump(e) {
            if(isGameOver) return;
            gameStarted = true; 
            velocity = -6; 
        }

        // מאזין למגע רק על אזור המשחק (זה לא יחסום את הכפתורים!)
        gameContainer.addEventListener('touchstart', handleJump, {passive: false});
        window.addEventListener('mousedown', handleJump);

        function gameLoop() {
            if (!gameStarted || isGameOver) { requestAnimationFrame(gameLoop); return; }
            velocity += 0.3; y += velocity; player.style.top = y + 'px';
            if (y > window.innerHeight || y < 0) gameOver();
            
            obstacles.forEach((obs, index) => {
                let obsLeft = parseInt(obs.style.left);
                obs.style.left = (obsLeft - gameSpeed) + 'px';
                let p = player.getBoundingClientRect(), o = obs.getBoundingClientRect();
                if (!isGodMode && p.left < o.right && p.right > o.left && p.top < o.bottom && p.bottom > o.top) gameOver();
                if (obsLeft < -100) { obs.remove(); obstacles.splice(index, 1); score++; scoreDisplay.innerText = "Score: " + score; }
            });
            requestAnimationFrame(gameLoop);
        }

        setInterval(() => {
            if (gameStarted && !isGameOver) {
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                obs.style.top = (Math.random() * (window.innerHeight - 50)) + 'px';
                obs.style.left = window.innerWidth + 'px';
                document.body.appendChild(obs);
                obstacles.push(obs);
            }
        }, 1500);

        gameLoop();
    </script>
</body>
</html>
