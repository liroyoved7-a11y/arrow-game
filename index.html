<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>משחק החץ המאתגר - Arrow Flyer Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Statcounter Code -->
    <script type="text/javascript">
        var sc_project=13288355; 
        var sc_invisible=1; 
        var sc_security="bd1c8e65"; 
    </script>
    <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>

    <style>
        body { margin: 0; overflow: hidden; background: #33FF57; font-family: 'Arial', sans-serif; touch-action: none; transition: background 0.5s; }
        #player { position: absolute; left: 100px; font-size: 50px; transform: rotate(90deg); transition: transform 0.1s; }
        .obstacle { position: absolute; background: red; height: 10px; border-radius: 5px; }
        #score { position: absolute; top: 20px; left: 20px; font-size: 30px; color: white; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 40px; color: white; font-weight: bold; cursor: pointer; text-shadow: 2px 2px 4px #000; padding: 20px; }
        
        #ap-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 5px 10px; cursor: pointer; border-radius: 5px; z-index: 100; font-size: 20px;}
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; color: white; }
        .panel { background: #222; padding: 20px; border-radius: 10px; text-align: center; width: 300px;}
        input { padding: 8px; font-size: 16px; width: 80px; margin-bottom: 10px;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #33FF57; border: none; margin: 5px; border-radius: 5px;}
    </style>
</head>
<body>
    <div id="ap-btn" onclick="openPasswordModal()">AP</div>
    <div id="score">Score: 0</div>
    <div id="msg">לחץ או גע במסך כדי להתחיל!</div>
    <div id="player">➤</div>

    <div id="password-modal" class="modal">
        <div class="panel">
            <h2>הזן סיסמה</h2>
            <input type="password" id="passInput">
            <br><button onclick="checkPassword()">אישור</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="panel">
            <h2>פאנל ניהול</h2>
            Score: <input type="number" id="scoreInput"><br>
            Speed: <input type="number" id="speedInput"><br>
            Gravity: <input type="number" id="gravityInput" step="0.1"><br>
            <label><input type="checkbox" id="godModeToggle"> God Mode</label><br>
            <label><input type="checkbox" id="darkModeToggle"> Dark Mode</label><br>
            <button onclick="applySettings()">החל שינויים</button>
            <button onclick="resetGame()" style="background:#ff4444;">Reset Game</button>
            <button onclick="closeAdmin()">סגור</button>
        </div>
    </div>

    <script>
        const colors = ['#33FF57', '#FF5733', '#3357FF', '#F333FF', '#FF33A8', '#33FFF3'];
        let colorIndex = 0;
        let isPaused = false;
        let isGodMode = false;

        // משתני משחק
        let y = 300, velocity = 0, gameStarted = false, isGameOver = false, score = 0;
        let lastColorScore = 0;
        let obstacles = [];
        let gameSpeed = 5;
        let gravity = 0.3;
        const jumpStrength = -6;

        function changeBackgroundColor() {
            colorIndex = (colorIndex + 1) % colors.length;
            document.body.style.background = colors[colorIndex];
        }

        const jumpSound = new Audio('https://actions.google.com/sounds/v1/ui/click.ogg');
        const player = document.getElementById('player');
        const msg = document.getElementById('msg');
        const scoreDisplay = document.getElementById('score');
        
        function handleInput() {
            if (isGameOver) location.reload();
            else if (!gameStarted) {
                gameStarted = true;
                msg.style.display = 'none';
                gameLoop();
            } else if (!isPaused) {
                velocity = jumpStrength;
            }
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, { passive: false });

        // פונקציות פאנל
        function openPasswordModal() { isPaused = true; document.getElementById('password-modal').style.display = 'flex'; }
        
        function checkPassword() {
            if(document.getElementById('passInput').value === "4545") {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
                document.getElementById('scoreInput').value = score;
                document.getElementById('speedInput').value = gameSpeed;
                document.getElementById('gravityInput').value = gravity;
            } else { alert("סיסמה שגויה!"); }
        }

        function applySettings() {
            score = parseInt(document.getElementById('scoreInput').value);
            gameSpeed = parseInt(document.getElementById('speedInput').value);
            gravity = parseFloat(document.getElementById('gravityInput').value);
            isGodMode = document.getElementById('godModeToggle').checked;
            
            if(document.getElementById('darkModeToggle').checked) document.body.style.background = "#222";
            else document.body.style.background = colors[colorIndex];
            
            scoreDisplay.innerText = "Score: " + score;
        }

        function resetGame() { location.reload(); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; isPaused = false; }

        function gameLoop() {
            if (!gameStarted || isGameOver || isPaused) { requestAnimationFrame(gameLoop); return; }

            velocity += gravity;
            y += velocity;
            player.style.top = y + 'px';

            if (score > 0 && score % 25 === 0 && score !== lastColorScore) {
                changeBackgroundColor();
                lastColorScore = score;
            }

            obstacles.forEach((obs, index) => {
                let obsLeft = parseInt(obs.style.left);
                obs.style.left = (obsLeft - gameSpeed) + 'px';
                
                // בדיקת התנגשות (אלא אם God Mode פעיל)
                if (!isGodMode && player.getBoundingClientRect().left < obs.getBoundingClientRect().right && 
                    player.getBoundingClientRect().right > obs.getBoundingClientRect().left &&
                    player.getBoundingClientRect().top < obs.getBoundingClientRect().bottom && 
                    player.getBoundingClientRect().bottom > obs.getBoundingClientRect().top) gameOver();
                
                if (obsLeft < -100) { obs.remove(); obstacles.splice(index, 1); score++; scoreDisplay.innerText = "Score: " + score; }
            });

            if (y > window.innerHeight || y < 0) gameOver();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() { isGameOver = true; msg.style.display = 'block'; msg.innerHTML = "GAME OVER!<br>" + score; }
        setInterval(() => { if (!isPaused && gameStarted && !isGameOver) { const obs = document.createElement('div'); obs.className = 'obstacle'; obs.style.width = '100px'; obs.style.top = (Math.random() * (window.innerHeight - 50)) + 'px'; obs.style.left = window.innerWidth + 'px'; document.body.appendChild(obs); obstacles.push(obs); }}, 1500);
    </script>
</body>
</html>
