<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Arrow Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script type="text/javascript">
        var sc_project=13288355; 
        var sc_invisible=1; 
        var sc_security="bd1c8e65"; 
    </script>
    <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>

    <style>
        body { margin: 0; overflow: hidden; background: #33FF57; font-family: sans-serif; touch-action: none; transition: background 0.3s; }
        #player { position: absolute; left: 100px; font-size: 50px; transform: rotate(90deg); z-index: 2; }
        .obstacle { position: absolute; background: red; height: 10px; border-radius: 5px; z-index: 1; }
        #score { position: absolute; top: 20px; left: 20px; font-size: 30px; color: white; pointer-events: none; z-index: 10; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 40px; color: white; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 10; display: none; }
        
        /* AP קיים רק למחשב */
        #ap-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; padding: 10px; cursor: pointer; z-index: 999; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .panel { background: #333; padding: 30px; border-radius: 15px; text-align: center; color: white; }
    </style>
</head>
<body>
    <div id="ap-btn" onclick="openPasswordModal()">AP</div>
    <div id="score">Score: 0</div>
    <div id="msg">GAME OVER!</div>
    <div id="player">➤</div>

    <div id="password-modal" class="modal">
        <div class="panel">
            <input type="password" id="passInput">
            <button onclick="checkPassword()">אישור</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="panel">
            Score: <input type="number" id="scoreInput"><br>
            <button onclick="applySettings()">החל</button>
        </div>
    </div>

    <script>
        let isPaused = false, y = 300, velocity = 0, score = 0, gameStarted = false, isGameOver = false, gameSpeed = 5;
        let obstacles = [];
        const player = document.getElementById('player'), msg = document.getElementById('msg'), scoreDisplay = document.getElementById('score');

        function openPasswordModal() { isPaused = true; document.getElementById('password-modal').style.display = 'flex'; }
        
        function checkPassword() {
            if(document.getElementById('passInput').value === "4545") {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
            } else { alert("סיסמה שגויה"); }
        }

        function applySettings() {
            score = parseInt(document.getElementById('scoreInput').value);
            scoreDisplay.innerText = "Score: " + score;
            closeModals();
        }

        function closeModals() { isPaused = false; document.getElementById('password-modal').style.display = 'none'; document.getElementById('admin-panel').style.display = 'none'; }

        function handleInput(e) {
            if (isGameOver) location.reload();
            if (isPaused) return;
            gameStarted = true;
            velocity = -6;
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, { passive: false });

        function gameLoop() {
            if (isPaused) { requestAnimationFrame(gameLoop); return; }
            if (!gameStarted) { requestAnimationFrame(gameLoop); return; }
            
            velocity += 0.3; y += velocity; player.style.top = y + 'px';
            
            if (y > window.innerHeight || y < 0) { isGameOver = true; msg.style.display = 'block'; document.body.style.background = 'orange'; }
            
            obstacles.forEach((obs, index) => {
                let obsLeft = parseInt(obs.style.left);
                obs.style.left = (obsLeft - gameSpeed) + 'px';
                
                let p = player.getBoundingClientRect(), o = obs.getBoundingClientRect();
                if (p.left < o.right && p.right > o.left && p.top < o.bottom && p.bottom > o.top) {
                    isGameOver = true; msg.style.display = 'block'; document.body.style.background = 'orange';
                }
                if (obsLeft < -100) { obs.remove(); obstacles.splice(index, 1); score++; scoreDisplay.innerText = "Score: " + score; }
            });
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        setInterval(() => { 
            if (!isPaused && gameStarted && !isGameOver) {
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                obs.style.width = '100px';
                obs.style.top = (Math.random() * (window.innerHeight - 50)) + 'px';
                obs.style.left = window.innerWidth + 'px';
                document.body.appendChild(obs);
                obstacles.push(obs);
            }
        }, 1500);
        gameLoop();
    </script>
</body>
</html>
