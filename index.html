<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Game - Clean & Sound</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #33FF57; 
            font-family: sans-serif; 
            transition: background 1s ease; 
        }
        
        #announcement-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: red; color: yellow; display: none; 
            align-items: center; justify-content: center; 
            font-size: 25px; font-weight: bold; z-index: 9999; 
            border-bottom: 5px solid yellow; animation: flash 0.5s infinite; 
        }

        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
        
        #player { 
            position: absolute; left: 100px; font-size: 50px; 
            transform: rotate(90deg); z-index: 2; top: 300px; transition: top 0.1s; 
        }
        
        .obstacle { 
            position: absolute; background: red; height: 20px; width: 80px; 
            border-radius: 5px; z-index: 1; box-shadow: 0 0 10px white; border: 1px solid black; 
        }
        
        #score, #best-score, #location { 
            position: absolute; left: 20px; color: white; font-size: 20px; 
            pointer-events: none; z-index: 10; font-weight: bold; text-shadow: 1px 1px 2px black; 
        }
        #score { top: 60px; }
        #best-score { top: 90px; color: yellow; }
        #location { top: 120px; font-size: 15px; font-style: italic; }
        
        #ap-btn { 
            position: absolute; top: 60px; right: 10px; background: red; 
            color: white; padding: 10px; cursor: pointer; z-index: 999; 
            border-radius: 5px; font-weight: bold; 
        }
        
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; 
            align-items: center; color: white; flex-direction: column; 
        }
        
        .panel { 
            background: #222; padding: 20px; border-radius: 15px; 
            text-align: center; border: 2px solid #fff; max-height: 80vh; 
            overflow-y: auto; width: 300px; 
        }
        
        input, select { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; width: 200px; }
        
        button { padding: 10px 20px; cursor: pointer; margin: 5px; border-radius: 5px; border: none; background: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="announcement-bar"></div>
    <div id="ap-btn" onclick="openPasswordModal()">ADMIN</div>
    <div id="score">Score: 0</div>
    <div id="best-score">Best: 0</div>
    <div id="location">Loading...</div>
    
    <div id="game-container"><div id="player">➤</div></div>

    <div id="password-modal" class="modal">
        <div class="panel">
            <h2>כניסת מנהל</h2>
            <input type="password" id="passInput" placeholder="סיסמה">
            <br>
            <button onclick="checkPassword()">אישור</button>
            <button onclick="closeModals()">ביטול</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="panel">
            <h2>Admin Panel</h2>
            Score: <input type="number" id="scoreInput"><br>
            Speed: <input type="number" id="speedInput"><br>
            <label><input type="checkbox" id="godModeToggle"> God Mode</label><br>
            Skin: <select id="skinInput">
                <option value="➤">➤</option>
                <option value="🚀">🚀</option>
                <option value="🔥">🔥</option>
                <option value="😎">😎</option>
            </select><br>
            BG Color: <input type="color" id="colorInput" value="#33FF57"><br>
            <input type="text" id="msgInput" placeholder="הודעה לכולם"><br>
            <button onclick="sendAnnouncement()">שלח הודעה</button><br>
            <button onclick="applySettings()">שמור הכל</button>
            <button onclick="kickAllPlayers()" style="background: red; color: white;">Kick All</button>
            <button onclick="closeModals()">סגור</button>
        </div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="panel">
            <h1>GAME OVER!</h1>
            <input type="text" id="playerName" placeholder="שם...">
            <button onclick="submitScore()">שמור</button>
            <div id="list"></div>
            <button onclick="location.reload()">שחק שוב</button>
        </div>
    </div>

    <script>
        // --- הגדרות בסיס ---
        const firebaseConfig = {
            apiKey: "AIzaSyBb-YNjJeCIk23EdUxVLrfeWkpuuicc3sY",
            authDomain: "arrowgameleaderboard.firebaseapp.com",
            projectId: "arrowgameleaderboard",
            storageBucket: "arrowgameleaderboard.firebasestorage.app",
            messagingSenderId: "486658082903",
            appId: "1:486658082903:web:d6f86af4c5aba6a78ffb12"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let score = 0, y = 300, velocity = 0, gameStarted = false, isGameOver = false, gameSpeed = 5, isGodMode = false, isPaused = false;
        let lastReloadTime = null;
        let obstacles = [];
        let announcementTimer; 
        const player = document.getElementById('player');

        // --- ניהול סאונד ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            return audioCtx;
        }

        function playJumpSound() {
            try {
                const ctx = getAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.value = 400;
                
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
                
                oscillator.start();
                oscillator.stop(ctx.currentTime + 0.1);
            } catch(e) { console.error("Sound error:", e); }
        }

        function playGameOverSound() {
            try {
                const ctx = getAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(400, ctx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.5);
                
                gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
                
                oscillator.start();
                oscillator.stop(ctx.currentTime + 0.5);
            } catch(e) { console.error("Sound error:", e); }
        }

        // --- לוגיקת המשחק ---
        db.collection("system").doc("settings").onSnapshot((doc) => {
            if (!doc.exists) return;
            const data = doc.data();
            if (lastReloadTime === null) { lastReloadTime = data.command; }
            else if (data.command && data.command !== lastReloadTime) { location.reload(); }
            
            if (data.playerIcon) player.innerText = data.playerIcon;
            if (data.backgroundColor) document.body.style.backgroundColor = data.backgroundColor;
            
            if (data.message) {
                const bar = document.getElementById('announcement-bar');
                bar.innerText = data.message;
                bar.style.display = data.message.trim() ? 'flex' : 'none';
                
                if (data.message.trim() !== "") {
                    clearTimeout(announcementTimer);
                    announcementTimer = setTimeout(() => { bar.style.display = 'none'; }, 10000); 
                }
            }
        });

        function updateBackgroundByScore(s) {
            let bg = "";
            if (s < 25) bg = "#33FF57";
            else if (s < 50) bg = "linear-gradient(to bottom, #ffa500, #ffffff)";
            else if (s < 100) bg = "#0000ff";
            else if (s < 150) bg = "#000000";
            else if (s < 300) bg = "linear-gradient(135deg, #ff0000, #ffa500, #ffffff)";
            else bg = "#550000";
            document.body.style.background = bg;
        }

        // --- ממשק מנהל ---
        function openPasswordModal() { isPaused = true; document.getElementById('password-modal').style.display = 'flex'; }
        function closeModals() { isPaused = false; document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        
        function checkPassword() {
            if(document.getElementById('passInput').value === "1245") {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
            } else { alert("סיסמה שגויה"); }
        }

        async function sendAnnouncement() { await db.collection("system").doc("settings").update({ message: document.getElementById('msgInput').value }); alert("נשלח!"); }
        async function kickAllPlayers() { await db.collection("system").doc("settings").update({ command: Date.now() }); }
        
        async function applySettings() {
            score = parseInt(document.getElementById('scoreInput').value) || score;
            gameSpeed = parseInt(document.getElementById('speedInput').value) || gameSpeed;
            isGodMode = document.getElementById('godModeToggle').checked;
            await db.collection("system").doc("settings").update({ 
                playerIcon: document.getElementById('skinInput').value,
                backgroundColor: document.getElementById('colorInput').value
            });
            closeModals();
        }

        // --- ניקוד וטבלה ---
        async function submitScore() {
            const name = document.getElementById('playerName').value || "Anonymous";
            await db.collection("scores").add({ name: name, score: parseInt(score), timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            updateLeaderboard();
            alert("נשמר!");
        }

        async function updateLeaderboard() {
            const snapshot = await db.collection("scores").orderBy("score", "desc").limit(3).get();
            let html = "<h3>Top 3:</h3>";
            snapshot.forEach((doc, i) => { html += `<p>${i+1}. ${doc.data().name}: ${doc.data().score}</p>`; });
            document.getElementById('list').innerHTML = html;
        }

        // --- לולאת המשחק ---
        function gameLoop() {
            if (isPaused) { requestAnimationFrame(gameLoop); return; }
            if (!gameStarted || isGameOver) { requestAnimationFrame(gameLoop); return; }
            
            velocity += 0.3; 
            y += velocity; 
            player.style.top = y + 'px';
            
            if (y > window.innerHeight || y < 0) gameOver();
            
            obstacles.forEach((obs, index) => {
                let obsLeft = parseInt(obs.style.left);
                obs.style.left = (obsLeft - gameSpeed) + 'px';
                
                let p = player.getBoundingClientRect();
                let o = obs.getBoundingClientRect();
                
                if (!isGodMode && p.left < o.right && p.right > o.left && p.top < o.bottom && p.bottom > o.top) { 
                    gameOver(); 
                }

                if (!obs.passed && obsLeft + 80 < 100) {
                    obs.passed = true;
                    score++;
                    document.getElementById('score').innerText = "Score: " + score;
                    updateBackgroundByScore(score);
                    
                    if (score >= 100) {
                        player.innerText = '🚀';
                    }
                }
                
                if (obsLeft < -100) { 
                    obs.remove(); 
                    obstacles.splice(index, 1); 
                }
            });
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            playGameOverSound();
            isGameOver = true;
            document.getElementById('game-over-modal').style.display = 'flex';
            updateLeaderboard();
        }

        function handleJump() { 
            if(isGameOver || isPaused) return; 
            gameStarted = true; 
            velocity = -6; 
            playJumpSound();
        }

        window.addEventListener('mousedown', handleJump);
        window.addEventListener('touchstart', handleJump);

        setInterval(() => {
            if (gameStarted && !isGameOver && !isPaused) {
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                obs.style.top = (Math.random() * (window.innerHeight - 100)) + 'px';
                obs.style.left = window.innerWidth + 'px';
                obs.passed = false;
                document.body.appendChild(obs);
                obstacles.push(obs);
            }
        }, 1200);

        gameLoop();
        
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => { 
            document.getElementById('location').innerText = d.city + ", " + d.country_name; 
        }).catch(() => {});
    </script>
</body>
</html>
